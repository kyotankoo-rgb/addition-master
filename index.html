<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="더하기 마스터">
  <meta name="theme-color" content="#1a0a2e">
  <title>더하기 마스터</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0a1628 100%); color: #fff; transition: background 0.5s ease; }

    /* 라운드별 배경색 */
    body.round-1 { background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0a1628 100%); }
    body.round-2 { background: linear-gradient(135deg, #0c1830 0%, #1e3352 50%, #0c1830 100%); }
    body.round-3 { background: linear-gradient(135deg, #0e1a38 0%, #22395a 50%, #0e1a38 100%); }
    
    /* 목표 달성 축하 애니메이션 */
    .goal-celebration {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;
    }
    .goal-celebration .celebration-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 42px; font-weight: 900; color: #93c5fd; text-shadow: 0 0 20px #93c5fd, 0 0 40px #3b82f6;
      animation: celebrateText 2.3s ease-out forwards; opacity: 0;
      text-align: center; width: 100%; display: flex; align-items: center; justify-content: center;
    }
    @keyframes celebrateText {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      50% { transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) translateY(-50px); }
    }
    .celebration-reward {
      font-size: 32px; margin-top: 15px; color: #fff;
      text-shadow: 0 0 15px #2563eb, 0 0 30px #93c5fd;
      animation: rewardPop 0.5s ease-out 0.3s both;
      text-align: center;
    }
    @keyframes rewardPop {
      0% { opacity: 0; transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .confetti {
      position: absolute; width: 10px; height: 10px; opacity: 0;
      animation: confettiFall 3s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
    .firework {
      position: absolute; width: 6px; height: 6px; border-radius: 50%;
      animation: fireworkBurst 1s ease-out forwards;
    }
    @keyframes fireworkBurst {
      0% { opacity: 1; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2); }
    }
    .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .hidden { display: none !important; }
    button { font-family: inherit; cursor: pointer; border: none; }
    input { font-family: inherit; }
    
    /* 언어 선택 */
    .lang-selector { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; max-width: 340px; margin: 0 auto 15px auto; }
    .lang-btn { padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.1); color: #888; border: 1px solid #444 !important; }
    .lang-btn.active { background: rgba(255,107,107,0.2); color: #3b82f6; border-color: #3b82f6 !important; }
    
    /* 타이틀 */
    .title-icon { font-size: 70px; font-weight: 900; background: linear-gradient(135deg, #3b82f6, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .title-text { font-size: 32px; font-weight: 700; margin: 10px 0; text-align: center; }
    
    /* 정답/오답 애니메이션 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
      20%, 40%, 60%, 80% { transform: translateX(8px); }
    }
    @keyframes bounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      50% { transform: scale(0.9); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes correctPulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 217, 61, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(255, 217, 61, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 217, 61, 0); }
    }
    .shake { animation: shake 0.5s ease-in-out; }
    .bounce { animation: bounce 0.4s ease-out; }
    .correct-pulse { animation: correctPulse 0.6s ease-out; }
    .title-sub { color: #aa88cc; margin-bottom: 30px; }
    .best-record { color: #93c5fd; font-size: 14px; margin-bottom: 30px; }
    .btn-start { background: linear-gradient(135deg, #3b82f6, #60a5fa); padding: 16px 48px; border-radius: 50px; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 15px; box-shadow: 0 0 30px rgba(255,107,107,0.4); }
    .btn-practice { background: linear-gradient(135deg, #10b981, #34d399); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 15px; box-shadow: 0 0 20px rgba(16,185,129,0.4); }
    .btn-quit { background: rgba(239,68,68,0.2); border: 2px solid #ef4444 !important; padding: 10px 24px; border-radius: 50px; font-size: 14px; color: #ef4444; margin-top: 20px; }
    .btn-how { background: transparent; border: 2px solid #555 !important; padding: 10px 20px; border-radius: 50px; font-size: 13px; color: #888; }
    .btn-rank { background: linear-gradient(135deg, #f59e0b, #fbbf24); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 15px; box-shadow: 0 0 20px rgba(245,158,11,0.4); }
    .bottom-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    
    /* 게임 방법 모달 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: linear-gradient(135deg, #2d1b4e, #1a0a2e); border-radius: 20px; padding: 30px; max-width: 350px; border: 1px solid #444; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .modal-text { color: #aaa; font-size: 14px; line-height: 1.8; margin-bottom: 15px; }
    .modal-text strong { color: #3b82f6; }
    .modal-text .gold { color: #ffd700; }
    .modal-close { background: linear-gradient(135deg, #3b82f6, #60a5fa); padding: 12px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-top: 20px; width: 100%; }
    
    /* 이름 입력 */
    .name-label { margin-bottom: 30px; font-size: 20px; }
    .name-input { background: rgba(255,255,255,0.1); border: 2px solid #444; border-radius: 12px; padding: 16px 24px; font-size: 18px; color: #fff; text-align: center; width: 250px; outline: none; }
    .btn-go { background: linear-gradient(135deg, #3b82f6, #60a5fa); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-top: 30px; }
    .btn-go:disabled { background: #333; color: #666; }
    .btn-home { background: transparent; border: 2px solid #555 !important; padding: 12px 32px; border-radius: 50px; font-size: 14px; color: #888; margin-top: 15px; }
    
    /* 라운드 전환 화면 */
    .round-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #0a1628, #1a2d4a); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
    .round-number { font-size: 80px; font-weight: 900; background: linear-gradient(135deg, #3b82f6, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: roundPop 0.5s ease-out; }
    .round-text { font-size: 28px; margin-top: 10px; color: #fff; }
    .round-sub { font-size: 16px; color: #aa88cc; margin-top: 15px; }
    @keyframes roundPop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    
    /* 게임 */
    .game-area { width: 100%; max-width: 400px; text-align: center; }
    .player-display { font-size: 16px; font-weight: 600; color: #93c5fd; margin-bottom: 10px; }
    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; color: #888; }
    
    /* 점수판 */
    .score-container { position: relative; padding: 8px 20px; background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(255,150,0,0.1)); border-radius: 20px; border: 2px solid rgba(255,107,107,0.5); box-shadow: 0 0 20px rgba(255,107,107,0.3); }
    .score-container.bonus-active { animation: scoreGlow 0.5s ease-out; border-color: #93c5fd; box-shadow: 0 0 30px rgba(255,217,61,0.6), 0 0 60px rgba(255,150,0,0.3); }
    @keyframes scoreGlow { 0% { transform: scale(1); } 30% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .score-text { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #93c5fd, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .score-text.animating { animation: scorePop 0.4s ease-out; }
    @keyframes scorePop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    
    .game-header .hl-orange { color: #3b82f6; font-weight: 700; }
    .game-header .hl-yellow { color: #93c5fd; font-weight: 700; }
    
    /* 라운드 정보 */
    .round-info { font-size: 12px; color: #aa88cc; margin-bottom: 10px; padding: 5px 15px; background: rgba(170,136,204,0.1); border-radius: 15px; display: inline-block; }
    
    /* 타이머 바 */
    .timer-labels { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 10px; }
    .timer-label { padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .timer-label.gold { background: rgba(255,215,0,0.3); color: #ffd700; }
    .timer-label.orange { background: rgba(255,107,107,0.2); color: #3b82f6; }
    .timer-label.purple { background: rgba(136,102,170,0.2); color: #aa88cc; }
    
    .timer-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; margin-bottom: 20px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .timer-fill { height: 100%; border-radius: 6px; transition: background 0.3s; }
    .timer-fill.bonus10 { background: linear-gradient(90deg, #ffd700, #ffaa00, #ffd700); box-shadow: 0 0 15px #ffd700; animation: timerPulse10 0.3s infinite alternate; }
    .timer-fill.bonus5 { background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6); box-shadow: 0 0 10px #3b82f6; }
    .timer-fill.nobonus { background: linear-gradient(90deg, #8866aa, #6644aa); }
    @keyframes timerPulse10 { from { filter: brightness(1); } to { filter: brightness(1.3); } }
    
    .question-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; margin-bottom: 25px; position: relative; overflow: hidden; border: 1px solid rgba(255,107,107,0.1); }
    
    /* 보너스 텍스트 */
    .bonus-float { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: 900; pointer-events: none; z-index: 100; opacity: 0; }
    .bonus-float.bonus10 { background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px #ffd700); }
    .bonus-float.bonus5 { background: linear-gradient(135deg, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px #3b82f6); }
    .bonus-float.bonus0 { background: linear-gradient(135deg, #ffffff, #aaaaaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px; }
    .bonus-float.animate { animation: bonusFloat 1s ease-out forwards; }
    @keyframes bonusFloat { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); } }
    
    /* 파티클 */
    .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: particleFly 1s ease-out forwards; }
    @keyframes particleFly { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }
    
    .q-problem { font-size: 40px; font-weight: 800; }
    .q-num1 { color: #3b82f6; }
    .q-num2 { color: #93c5fd; }
    .q-mark { font-size: 28px; margin-top: 15px; color: #555; }
    .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .opt-btn { background: rgba(255,255,255,0.1); border: 2px solid #444 !important; border-radius: 16px; padding: 20px; font-size: 26px; font-weight: 700; color: #fff; transition: transform 0.1s; }
    .opt-btn:active { transform: scale(0.95); }
    .opt-btn.correct { background: rgba(0,255,136,0.3); border-color: #00ff88 !important; box-shadow: 0 0 20px rgba(0,255,136,0.5); }
    .opt-btn.wrong { background: rgba(255,68,68,0.3); border-color: #ff4444 !important; }
    
    /* 결과 */
    .result-emoji { font-size: 60px; margin-bottom: 20px; }
    .result-title { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    .result-title.win { background: linear-gradient(135deg, #3b82f6, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .result-title.lose { color: #3b82f6; }
    .result-score { font-size: 48px; font-weight: 800; color: #93c5fd; margin: 10px 0; }
    .result-best { font-size: 14px; color: #3b82f6; margin-bottom: 10px; }
    .result-stats { font-size: 13px; color: #888; margin-bottom: 20px; }
    .result-msg { color: #3b82f6; margin-bottom: 20px; font-size: 18px; }
    .btn-retry { background: linear-gradient(135deg, #3b82f6, #60a5fa); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-right: 10px; }
    .btn-board { background: transparent; border: 2px solid #93c5fd !important; padding: 14px 40px; border-radius: 50px; font-size: 16px; color: #93c5fd; }
    
    /* 리더보드 */
    .board-list { background: rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; width: 100%; max-width: 400px; }
    .board-item { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #333; }
    .board-item:last-child { border-bottom: none; }
    .board-rank { width: 30px; font-size: 20px; }
    .board-name { font-weight: 600; }
    .board-score { color: #93c5fd; font-weight: 700; }
    .btn-back { background: transparent; border: 2px solid #555 !important; padding: 14px 40px; border-radius: 50px; font-size: 16px; color: #888; margin-top: 30px; }

    /* 광고 팝업 */
    .ad-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .ad-popup { background: linear-gradient(135deg, #1a2d4a, #0a1628); border-radius: 24px; padding: 35px 30px; max-width: 340px; width: 100%; border: 2px solid #3b82f6; text-align: center; box-shadow: 0 0 40px rgba(59,130,246,0.3); }
    .ad-popup-icon { font-size: 60px; margin-bottom: 15px; }
    .ad-popup-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .ad-popup-msg { font-size: 14px; color: #93c5fd; margin-bottom: 25px; line-height: 1.6; }
    .ad-popup-count { font-size: 13px; color: #666; margin-bottom: 20px; }
    .btn-watch-ad { background: linear-gradient(135deg, #10b981, #34d399); padding: 16px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; width: 100%; margin-bottom: 12px; box-shadow: 0 0 20px rgba(16,185,129,0.4); }
    .btn-remove-ads { background: linear-gradient(135deg, #f59e0b, #fbbf24); padding: 14px 40px; border-radius: 50px; font-size: 14px; font-weight: 700; color: #fff; width: 100%; box-shadow: 0 0 20px rgba(245,158,11,0.3); }
    .ad-free-badge { display: inline-block; background: linear-gradient(135deg, #10b981, #34d399); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #fff; margin-left: 8px; }

    /* 목표 설정 */
    .btn-goal { background: transparent; border: 2px solid #555 !important; padding: 10px 20px; border-radius: 50px; font-size: 13px; color: #888; }
    .goal-display { background: rgba(255,217,61,0.1); border: 1px solid rgba(255,217,61,0.3); border-radius: 12px; padding: 12px 20px; margin-bottom: 20px; max-width: 280px; }
    .goal-target { color: #93c5fd; font-weight: 600; font-size: 14px; }
    .goal-reward { color: #3b82f6; font-size: 12px; margin-top: 5px; }
    
    .goal-form { text-align: left; }
    .goal-label { display: block; color: #888; font-size: 12px; margin-bottom: 5px; margin-top: 15px; }
    .goal-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #fff; outline: none; }
    .goal-input:focus { border-color: #3b82f6; }
    .goal-select { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #fff; outline: none; }
    .goal-row { display: flex; gap: 10px; }
    .goal-row > div { flex: 1; }
    .goal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .goal-buttons button { flex: 1; padding: 12px; border-radius: 25px; font-size: 14px; font-weight: 600; }
    .btn-save-goal { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; }
    .btn-delete-goal { background: rgba(255,68,68,0.2); color: #3b82f6; border: 1px solid #3b82f6 !important; }
    
    /* 목표 달성 결과 */
    .goal-result { margin: 15px 0; padding: 15px; border-radius: 12px; }
    .goal-achieved { background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(255,217,61,0.2)); border: 2px solid #93c5fd; animation: goalPulse 1s infinite alternate; }
    .goal-failed { background: rgba(255,255,255,0.05); border: 1px solid #444; }
    .goal-result-title { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
    .goal-result-name { font-size: 22px; font-weight: 800; color: #93c5fd; margin: 8px 0; }
    .goal-result-reward { color: #93c5fd; font-size: 20px; font-weight: 700; margin: 10px 0; }
    .goal-result-sub { color: #888; font-size: 13px; }
    .btn-share { background: linear-gradient(135deg, #3b82f6, #60a5fa); padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; color: #fff; margin-top: 15px; border: none; cursor: pointer; box-shadow: 0 0 15px rgba(59,130,246,0.4); }
    @keyframes goalPulse { from { box-shadow: 0 0 20px rgba(255,217,61,0.3); } to { box-shadow: 0 0 40px rgba(255,217,61,0.5); } }    /* 커스텀 아이콘 */    .icon { width: 1.6em; height: 1.6em; vertical-align: -0.35em; display: inline-block; margin-right: 6px; }    .icon-lg { width: 60px; height: 60px; }    .icon-md { width: 40px; height: 40px; }    .icon-sm { width: 24px; height: 24px; }    .icon-xs { width: 18px; height: 18px; }    .result-emoji img { width: 60px; height: 60px; }    .ad-popup-icon img { width: 100px; height: 100px; }    .celebration-text img { width: 48px; height: 48px; vertical-align: middle; }    .celebration-reward img { width: 32px; height: 32px; vertical-align: middle; }
    
  
    /* 버튼 내 아이콘 크기 조절 */
    .btn-goal img, .btn-rank img, .btn-home img, .btn-share img, .btn-watch-ad img, .btn-remove-ads img { width: 24px; height: 24px; vertical-align: -5px; }
    .best-record img, .goal-display img { width: 22px; height: 22px; vertical-align: -4px; }
    .goal-result img { width: 26px; height: 26px; vertical-align: -5px; }
    .result-best img { width: 28px; height: 28px; vertical-align: -6px; }
  
    

  
    

  
    

  
    /* 버튼 아이콘 절대 위치로 텍스트 센터 유지 */
    .btn-home, .btn-share, .btn-rank, .btn-board {
      position: relative !important;
      padding-left: 40px !important;
      padding-right: 40px !important;
    }
    .btn-home img, .btn-share img, .btn-rank img, .btn-board img {
      position: absolute !important;
      left: 15px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      width: 20px !important;
      height: 20px !important;

<script>
// ===== 진동 (Capacitor Haptics) =====
async function vibrate() {
  console.log('📳 VIBRATE CALLED!');
  try {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics) {
      await window.Capacitor.Plugins.Haptics.vibrate({ duration: 100 });
    } else if (navigator.vibrate) {
      navigator.vibrate(100);
    }
  } catch (e) { /* 진동 미지원 */ }
}

// ===== AdMob 광고 =====
const ADMOB_INTERSTITIAL_ID = 'ca-app-pub-3940256099942544/1033173712';
let adLoaded = false;
let adCallback = null;

async function initAdMob() {
  try {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AdMob) {
      const AdMob = window.Capacitor.Plugins.AdMob;
      await AdMob.initialize({ testingDevices: [], initializeForTesting: true });

      // 광고 닫힘 이벤트 리스너
      AdMob.addListener('interstitialAdDismissed', () => {
        console.log('Ad dismissed');
        adLoaded = false;
        prepareInterstitial();
        if (adCallback) {
          adCallback();
          adCallback = null;
        }
      });

      // 광고 로드 실패 시
      AdMob.addListener('interstitialAdFailedToLoad', () => {
        console.log('Ad failed to load');
        adLoaded = false;
        if (adCallback) {
          adCallback();
          adCallback = null;
        }
      });

      // 광고 표시 실패 시
      AdMob.addListener('interstitialAdFailedToShow', () => {
        console.log('Ad failed to show');
        if (adCallback) {
          adCallback();
          adCallback = null;
        }
      });

      await prepareInterstitial();
      console.log('AdMob initialized');
    }
  } catch (e) { console.log('AdMob init error:', e); }
}

async function prepareInterstitial() {
  try {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AdMob) {
      const AdMob = window.Capacitor.Plugins.AdMob;
      await AdMob.prepareInterstitial({ adId: ADMOB_INTERSTITIAL_ID });
      adLoaded = true;
      console.log('Interstitial ready');
    }
  } catch (e) { console.log('Interstitial prepare error:', e); }
}

async function showInterstitialAd(callback) {
  adCallback = callback;
  try {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AdMob && adLoaded) {
      const AdMob = window.Capacitor.Plugins.AdMob;
      await AdMob.showInterstitial();
      return true;
    } else {
      if (adCallback) {
        adCallback();
        adCallback = null;
      }
    }
  } catch (e) {
    console.log('Interstitial show error:', e);
    if (adCallback) {
      adCallback();
      adCallback = null;
    }
  }
  return false;
}

document.addEventListener('DOMContentLoaded', initAdMob);

let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'triangle') {
  if (!audioCtx) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playGoalSound() {

    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'triangle';
    gain.gain.setValueAtTime(0.3, now + i * 0.15);

    osc.start(now + i * 0.15);
    osc.stop(now + i * 0.15 + 0.5);
  });
}

function makeOptions(n1, n2, correct) {
  const opts = new Set([correct]);
  opts.add(Math.random() > 0.5 ? correct + 1 : correct - 1);
  opts.add(correct + 2); opts.add(correct - 2);
  if (n2 > 1) opts.add(n1 * (n2 - 1));
  opts.add(n1 * (n2 + 1));
  if (n1 > 1) opts.add((n1 - 1) * n2);
  opts.add((n1 + 1) * n2);
  if (correct >= 10) { opts.add(correct + 10); if (correct - 10 > 0) opts.add(correct - 10); }
  
  const wrongOpts = Array.from(opts).filter(x => x !== correct && x > 0);
  for (let i = wrongOpts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongOpts[i], wrongOpts[j]] = [wrongOpts[j], wrongOpts[i]];
  }
  
  const finalOpts = [correct, ...wrongOpts.slice(0, 3)];
  while (finalOpts.length < 4) {
    const rand = correct + Math.floor(Math.random() * 20) - 10;
    if (rand > 0 && !finalOpts.includes(rand)) finalOpts.push(rand);
  }
  
  for (let i = finalOpts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [finalOpts[i], finalOpts[j]] = [finalOpts[j], finalOpts[i]];
  }
  
  return finalOpts.slice(0, 4);
}

function makeAdditionOptions(n1, n2, correct) {
  const opts = new Set([correct]);
  // 정답 근처 값들
  opts.add(correct + 1);
  opts.add(correct - 1);
  opts.add(correct + 2);
  opts.add(correct - 2);
  opts.add(correct + 10);
  if (correct > 10) opts.add(correct - 10);
  // 자릿수 실수 유도
  opts.add(n1 + n2 + 1);
  opts.add(n1 + n2 - 1);
  if (correct >= 100) {
    opts.add(correct + 100);
    if (correct > 100) opts.add(correct - 100);
  }

  const wrongOpts = Array.from(opts).filter(x => x !== correct && x > 0);
  for (let i = wrongOpts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongOpts[i], wrongOpts[j]] = [wrongOpts[j], wrongOpts[i]];
  }

  const finalOpts = [correct, ...wrongOpts.slice(0, 3)];
  while (finalOpts.length < 4) {
    const offset = Math.floor(Math.random() * 20) - 10;
    const rand = correct + offset;
    if (rand > 0 && !finalOpts.includes(rand)) finalOpts.push(rand);
  }

  for (let i = finalOpts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [finalOpts[i], finalOpts[j]] = [finalOpts[j], finalOpts[i]];
  }

  return finalOpts.slice(0, 4);
}

function updateTimer() {
  if (!gameRunning) return;
  
  const elapsed = Date.now() - timerStart;
  const remaining = Math.max(0, timerDuration - elapsed);
  const percent = (remaining / timerDuration) * 100;
  const config = ROUND_CONFIG[round];
  
  const bonus10Percent = ((config.timeLimit - config.bonus10) / config.timeLimit) * 100;
  const bonus5Percent = ((config.timeLimit - config.bonus5) / config.timeLimit) * 100;
  
  const tickLevel = Math.floor(percent / 10) * 10;
  if (tickLevel < lastTickPercent && tickLevel >= 0) {
    lastTickPercent = tickLevel;
    playTick(percent);
  }
  
  const fill = document.getElementById('timerFill');
  fill.style.width = percent + '%';
  
  if (percent > bonus10Percent) fill.className = 'timer-fill bonus10';
  else if (percent > bonus5Percent) fill.className = 'timer-fill bonus5';
  else fill.className = 'timer-fill nobonus';
  
  if (remaining <= 0) {
    gameRunning = false;
    playWrong();
    vibrate();
    if (isPracticeMode) {
      practiceWrong++;
      setTimeout(nextQuestion, 600);
    } else {
      endGame(false);
    }
    return;
  }
  
  rafId = requestAnimationFrame(updateTimer);
}

function startTimer() {
  const config = ROUND_CONFIG[round];
  timerDuration = config.timeLimit * 1000;
  timerStart = Date.now();
  lastTickPercent = 100;

}

function generateQuestion() {
  const config = ROUND_CONFIG[round];
  let newNum1, newNum2, attempts = 0;

  do {
    newNum1 = Math.floor(Math.random() * (config.maxNum - config.minNum + 1)) + config.minNum;
    newNum2 = Math.floor(Math.random() * (config.maxNum - config.minNum + 1)) + config.minNum;
    attempts++;
  } while ((newNum1 === lastNum1 && newNum2 === lastNum2) && attempts < 20);

  num1 = newNum1; num2 = newNum2;
  lastNum1 = num1; lastNum2 = num2;
  correctAnswer = num1 + num2;
  options = makeAdditionOptions(num1, num2, correctAnswer);
}

    const btn = document.getElementById('opt' + i);
    btn.disabled = true;
    if (options[i] === correctAnswer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  }
  
  if (selected === correctAnswer) {
    playCorrect();
    totalCorrect++;
    if (isPracticeMode) {
      practiceCorrect++;
    }

    // 정답 애니메이션
    const correctBtn = document.getElementById('opt' + idx);
    correctBtn.classList.add('bounce', 'correct-pulse');
    if (!isPracticeMode) {
      document.getElementById('scoreContainer').classList.add('bounce');
    }
    setTimeout(() => {
      correctBtn.classList.remove('bounce', 'correct-pulse');
      if (!isPracticeMode) {
        document.getElementById('scoreContainer').classList.remove('bounce');
      }
    }, 600);

    if (!isPracticeMode) {
      let points = 10;
      if (elapsedSec <= config.bonus10) points = 20;
      else if (elapsedSec <= config.bonus5) points = 15;

      score += points;

      // 목표 달성 체크
      checkAndCelebrateGoal(score);

      showScoreAnimation(points, points >= 15);

      setTimeout(() => { document.getElementById('scoreNum').textContent = score; }, 200);
    }
    setTimeout(nextQuestion, 500);
  } else {
    playWrong();
    vibrate();
    wrongAnswerIdx = idx;
    wrongAnswerSelected = selected;
    if (isPracticeMode) {
      practiceWrong++;
    }

    // 오답 애니메이션 - 화면 흔들림
    document.getElementById('screen-game').classList.add('shake');
    setTimeout(() => {
      document.getElementById('screen-game').classList.remove('shake');
    }, 500);

    if (isPracticeMode) {
      setTimeout(nextQuestion, 600);
    } else {
      setTimeout(() => endGame(false), 600);
    }
  }
}

function nextQuestion() {
  question++;
  
  if (question > 10) {
    round++;
    if (round > 3) { endGame(true); return; }
    question = 1;
    lastNum1 = 0; lastNum2 = 0;
    updateRoundBackground(round);
    showRoundScreen(round, showQuestion);
    return;
  }
  
  showQuestion();
}

function quitPractice() {
  stopTimer();
  // 현재 위치 저장
  savedRound = round;
  savedQuestion = question;
  endGame(false);
}

function endGame(won) {
  stopTimer();
  const L = LANG[currentLang];

  if (isPracticeMode) {
    // 연습 모드 결과 화면
    document.getElementById('resultEmoji').textContent = '📝';
    document.getElementById('resultTitle').textContent = L.practiceResult;
    document.getElementById('resultTitle').className = 'result-title win';
    document.getElementById('resultName').textContent = '';
    document.getElementById('resultNameSuffix').textContent = '';
    document.getElementById('resultScore').textContent = '';
    document.getElementById('resultBest').classList.add('hidden');
    document.getElementById('resultStats').classList.remove('hidden');
    document.getElementById('resultStats').textContent = L.practiceCorrect + ': ' + practiceCorrect + ' | ' + L.practiceWrong + ': ' + practiceWrong;
    document.getElementById('goalResult').classList.add('hidden');
    document.getElementById('resultMsg').innerHTML = '';
    // 랭킹 버튼 숨김, 다시하기를 계속하기로 변경
    document.getElementById('btnRankResult').classList.add('hidden');
    document.getElementById('btnRetry').textContent = L.continue || '계속하기';
    document.getElementById('btnRetry').onclick = resumePractice;
    showScreen('result');
    return;
  }

  // 일반 모드: 랭킹 버튼 표시, 다시하기 버튼 복원
  document.getElementById('btnRankResult').classList.remove('hidden');
  document.getElementById('btnRetry').textContent = L.retry;
  document.getElementById('btnRetry').onclick = restartGame;

  let isNewBest = false;
  if (score > bestScore) {
    bestScore = score;
    isNewBest = true;
    try { localStorage.setItem('multiply-best', bestScore.toString()); } catch(e) {}
  }

  if (score > 0) {
    leaderboard.push({ name: playerName, score: score, date: new Date().toLocaleDateString() });
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10);
    try { localStorage.setItem('addition-leaderboard', JSON.stringify(leaderboard)); } catch(e) {}
    // 홈화면 최고기록 업데이트
    if (leaderboard.length > 0) {
      const best = leaderboard[0];
      document.getElementById('bestRecord').classList.remove('hidden');
      document.getElementById('bestName').textContent = best.name;
      document.getElementById('bestScore').textContent = best.score;
    }
  }

  // 클리어 축하 (최고기록 아닐 때만)
  if (won && !(isNewBest && score > 0)) { playClear(); vibrateClear(); } else if (!won) { playGameOver(); }

  document.getElementById('resultEmoji').innerHTML = won ? '<img src="icon-victory.png" class="icon">' : '<img src="icon-gameover.png" class="icon">';
  document.getElementById('resultTitle').textContent = won ? L.congrats : L.gameOver;
  document.getElementById('resultTitle').className = 'result-title ' + (won ? 'win' : 'lose');
  document.getElementById('resultName').textContent = playerName;
  document.getElementById('resultNameSuffix').textContent = L.yourScore;
  document.getElementById('resultScore').textContent = score + L.pts;

  if (isNewBest && score > 0) {
    playNewRecord();
    vibrateNewRecord();
    document.getElementById('resultBest').innerHTML = L.newBest;
    document.getElementById('resultBest').classList.remove('hidden');
  } else {
    document.getElementById('resultBest').classList.add('hidden');
  }

  document.getElementById('resultStats').classList.add('hidden');

  // 목표 달성 체크
  const goalResult = document.getElementById('goalResult');
  const goalAchieved = checkGoalAchievement(score);

  if (goalAchieved === true) {
    goalResult.classList.remove('hidden', 'goal-failed');
    goalResult.classList.add('goal-achieved');
    document.getElementById('goalResultTitle').innerHTML = L.goalAchieved;
    document.getElementById('goalResultName').innerHTML = '<img src="icon-record.png" class="icon"> ' + playerName;
    document.getElementById('goalResultReward').innerHTML = '<img src="icon-reward.png" class="icon"> ' + (goalData.reward || '');
    document.getElementById('goalResultReward').classList.toggle('hidden', !goalData.reward);
    document.getElementById('goalResultSub').innerHTML = L.getReward;
    document.getElementById('btnShare').classList.remove('hidden');
    document.getElementById('btnShare').innerHTML = L.share;
  } else if (goalAchieved === false) {
    goalResult.classList.remove('hidden', 'goal-achieved');
    goalResult.classList.add('goal-failed');
    document.getElementById('goalResultTitle').innerHTML = L.goalNotYet;
    document.getElementById('goalResultReward').classList.add('hidden');
    document.getElementById('goalResultSub').innerHTML = L.needed.replace('{score}', goalData.targetScore) + L.pts + ' | ' + L.tryAgain;
    document.getElementById('btnShare').classList.add('hidden');
  } else {
    goalResult.classList.add('hidden');
    document.getElementById('btnShare').classList.add('hidden');
  }

  let msg = '';
  if (won) {
    if (score >= 550) msg = L.msg1;
    else if (score >= 450) msg = L.msg2;
    else if (score >= 350) msg = L.msg3;
    else msg = L.msg4;
  }
  document.getElementById('resultMsg').innerHTML = msg;

  showScreen('result');
}

function showLeaderboard() {
  const L = LANG[currentLang];
  const list = document.getElementById('boardList');
  if (leaderboard.length === 0) {
    list.innerHTML = '<div style="padding:30px;color:#666;text-align:center">' + L.noRecords + '</div>';
  } else {
    list.innerHTML = leaderboard.map((entry, i) => {
      const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      return `<div class="board-item"><div style="display:flex;align-items:center;gap:12px"><span class="board-rank">${rank}</span><span class="board-name">${entry.name}</span></div><span class="board-score">${entry.score}${L.pts}</span></div>`;
    }).join('');
  }
  showScreen('board');
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden && gameRunning) {
    const elapsed = Date.now() - timerStart;
    if (elapsed >= timerDuration) {
      stopTimer();
      if (!answered) {
        if (isPracticeMode) {
          playWrong();
    vibrate();
          practiceWrong++;
          setTimeout(nextQuestion, 600);
        } else {
          endGame(false);
        }
      }
    }
  }
});

// ===== 광고 팝업 로직 =====
let adPlayCount = 0;
let isAdFree = false;
const AD_PLAY_LIMIT = 3;

// 로컬스토리지에서 광고 관련 데이터 로드
try {
  const savedPlayCount = localStorage.getItem('addition-ad-playcount');
  if (savedPlayCount) adPlayCount = parseInt(savedPlayCount, 10) || 0;
  const savedAdFree = localStorage.getItem('addition-ad-free');
  if (savedAdFree === 'true') isAdFree = true;
} catch(e) {}

function saveAdData() {
  try {
    localStorage.setItem('addition-ad-playcount', adPlayCount.toString());
    localStorage.setItem('addition-ad-free', isAdFree.toString());
  } catch(e) {}
}

function updateAdPopupText() {
  const L = LANG[currentLang];
  document.getElementById('adPopupTitle').innerHTML = L.adPopupTitle;
  document.getElementById('adPopupMsg').innerHTML = L.adPopupMsg;
  document.getElementById('btnWatchAd').innerHTML = L.watchAd;
  document.getElementById('btnRemoveAds').innerHTML = L.removeAds;
}

function showAdPopup() {
  updateAdPopupText();
  document.getElementById('ad-popup').classList.remove('hidden');
}

function hideAdPopup() {
  document.getElementById('ad-popup').classList.add('hidden');
}

function shouldShowAdPopup() {
  // 광고 없는 버전이거나 연습모드면 팝업 안 띄움
  if (isAdFree || isPracticeMode) return false;
  return adPlayCount >= AD_PLAY_LIMIT;
}

function incrementPlayCount() {
  if (isAdFree || isPracticeMode) return;
  adPlayCount++;
  saveAdData();
}

async function watchAd() {
  // AdMob 광고 표시 - 광고가 닫힌 후 콜백 실행
  showInterstitialAd(() => {
    console.log('Ad closed, restarting game');
    // 광고 본 후 카운트 리셋
    adPlayCount = 0;
    saveAdData();
    hideAdPopup();
    // 게임 재시작
    restartGame();
  });
}

function removeAds() {
  // 실제 앱에서는 Google Play Billing을 여기서 호출
  // 지금은 시뮬레이션: 알림 표시
  const L = LANG[currentLang];
  alert('In-App Purchase will be available after app is published to Google Play.\n\n앱이 Google Play에 출시된 후 인앱 결제가 가능합니다.');
  // 테스트용: 광고 제거 적용
  // isAdFree = true;
  // adPlayCount = 0;
  // saveAdData();
  // hideAdPopup();
  // restartGame();
}

// restartGame 함수를 래핑하여 광고 팝업 체크 추가
const originalRestartGame = restartGame;
restartGame = function() {
  if (shouldShowAdPopup()) {
    showAdPopup();
    return;
  }
  originalRestartGame();
};

// 게임 시작 함수를 래핑하여 광고 팝업 체크 추가
const originalStartGame = startGame;
startGame = function() {
  if (shouldShowAdPopup()) {
    showAdPopup();
    return;
  }
  originalStartGame();
};

// 게임 종료 시 플레이 카운트 증가
const originalEndGame = endGame;
endGame = function(won) {
  incrementPlayCount();
  originalEndGame(won);
};
